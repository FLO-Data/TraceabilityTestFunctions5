# ─────────────────────────────────────────────────────────────────────────────
# Deploy Azure Function App (Python) - TraceabilityTestFunctions5
# Trigger: push to `main` branch (auto deploy) + manual dispatch
# Auth:    OIDC federated credential (User-assigned MSI:
#          github-TraceabilityTestFunctions5) with Contributor role
#          scoped ONLY to the TraceabilityTestFunctions5 function app.
# Target:  TraceabilityTestFunctions5 (Python 3.11, Linux Consumption Y1,
#          Sweden Central, RG TraceabilityByFLO)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Azure Function App - TraceabilityTestFunctions5

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'TraceabilityTestFunctions5'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: 'Test'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Set up Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 'Login to Azure (OIDC)'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_FUNC_TEST5 }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_FUNC_TEST5 }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_FUNC_TEST5 }}

      - name: 'Deploy Azure Functions (remote Oryx build)'
        uses: Azure/functions-action@v1
        id: deploy
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: 'Post-deploy sanity check + retry (NO settings change)'
        # Linux Consumption Python má pomalý cold start a SCM platform sa po
        # deploye obnovuje. Robíme niekoľko pokusov s exponential backoff.
        # POZOR: NIKDY nemažeme WEBSITE_RUN_FROM_PACKAGE — Azure/functions-action
        # ho nastavuje na URL nového blob-u s naším kódom. Vymazaním by sme
        # odpojili app od práve nasadenej verzie a spadla by do file system
        # fallback-u (ak vôbec).
        shell: bash
        run: |
          set -e
          APP="${{ env.AZURE_FUNCTIONAPP_NAME }}"
          RG="TraceabilityByFLO"
          URL="https://${APP,,}.azurewebsites.net/api/test"

          # 5 pokusov: 20, 30, 45, 60, 90s = ~245s celkovo
          DELAYS=(20 30 45 60 90)
          STATUS=0

          for i in "${!DELAYS[@]}"; do
            DELAY=${DELAYS[$i]}
            ATTEMPT=$((i + 1))
            echo "Attempt #${ATTEMPT}: sleeping ${DELAY}s..."
            sleep "$DELAY"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "  GET $URL -> $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Functions are alive (attempt #${ATTEMPT})."
              exit 0
            fi
          done

          # Po 5 zlyhaniach skús jeden mäkký restart bez zmeny appsettings.
          echo "⚠️  After 5 attempts still status=$STATUS. Soft restart..."
          az functionapp restart --name "$APP" --resource-group "$RG"
          echo "  Waiting 60s after restart..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "Final check: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✅ Recovered after soft restart."
            exit 0
          fi

          echo "❌ Function App is unhealthy. Last status=$STATUS"
          echo "Manual diagnosis:"
          echo "  az functionapp log tail --name $APP --resource-group $RG"
          echo "  az functionapp config appsettings list --name $APP -g $RG --query \"[?name=='WEBSITE_RUN_FROM_PACKAGE']\""
          exit 1

      - name: 'Logout from Azure'
        if: always()
        run: az logout
